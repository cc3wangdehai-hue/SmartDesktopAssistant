name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore SmartDesktopAssistant.sln
    
    - name: Build
      run: dotnet build SmartDesktopAssistant.sln --configuration Release --no-restore
    
    - name: Run Unit Tests
      run: dotnet test Tests/SmartDesktopAssistant.Tests/SmartDesktopAssistant.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
      continue-on-error: true
    
    - name: Test Results Summary
      if: always()
      run: |
        Write-Host "=========================================="
        Write-Host "Test Results Summary"
        Write-Host "=========================================="
        $trxFile = ".\Tests\SmartDesktopAssistant.Tests\TestResults\test-results.trx"
        if (Test-Path $trxFile) {
          Write-Host "Test results saved to: $trxFile"
          Write-Host "Download artifacts to see detailed results"
        } else {
          Write-Host "No test results file found"
        }
      shell: pwsh
    
    - name: Check build output
      run: |
        Write-Host "=========================================="
        Write-Host "Build Output Check"
        Write-Host "=========================================="
        $dlls = Get-ChildItem -Path ".\Output" -Filter "*.dll" -ErrorAction SilentlyContinue
        if ($dlls) {
          Write-Host "Found DLLs:"
          $dlls | ForEach-Object { Write-Host "  - $($_.Name)" }
        } else {
          Write-Host "No DLLs found in Output folder"
        }
      shell: pwsh
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SmartDesktopAssistant-build
        path: |
          Output/*.dll
          Output/*.exe
          Output/*.json
        retention-days: 7
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: Tests/SmartDesktopAssistant.Tests/TestResults/*.trx
        retention-days: 7
