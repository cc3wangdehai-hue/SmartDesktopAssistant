name: Build, Test, and Analyze

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore SmartDesktopAssistant.sln
    
    - name: Build
      run: dotnet build SmartDesktopAssistant.sln --configuration Release --no-restore
    
    # Security: Check for vulnerable dependencies
    - name: Security Scan - Vulnerable Packages
      run: |
        Write-Host "=========================================="
        Write-Host "Security: Checking for vulnerable packages"
        Write-Host "=========================================="
        dotnet list package --vulnerable --include-transitive
        if ($LASTEXITCODE -ne 0) {
          Write-Host "::warning::Vulnerable packages found!"
        }
      shell: pwsh
      continue-on-error: true
    
    # Unit Tests with Coverage
    - name: Run Unit Tests with Coverage
      run: |
        dotnet test Tests/SmartDesktopAssistant.Tests/SmartDesktopAssistant.Tests.csproj `
          --configuration Release --no-build `
          --verbosity normal `
          --logger "trx;LogFileName=test-results.trx" `
          --collect:"XPlat Code Coverage" `
          --results-directory ./TestResults
      continue-on-error: true
    
    # Coverage Report
    - name: Generate Coverage Report
      run: |
        Write-Host "=========================================="
        Write-Host "Code Coverage Report"
        Write-Host "=========================================="
        
        $coverageFile = Get-ChildItem -Path "./TestResults" -Recurse -Filter "coverage.cobertura.xml" | Select-Object -First 1
        if ($coverageFile) {
          [xml]$xml = Get-Content $coverageFile.FullName
          $lineRate = [double]$xml.coverage.'line-rate'
          $coveragePercent = [math]::Round($lineRate * 100, 2)
          
          Write-Host "Line Coverage: $coveragePercent%"
          Write-Host "Target: 80%"
          
          if ($lineRate -lt 0.8) {
            Write-Host "::warning::Coverage is below 80% threshold (current: $coveragePercent%)"
          } else {
            Write-Host "::notice::Coverage meets 80% threshold!"
          }
          
          # Save for artifact
          "Coverage: $coveragePercent%" | Out-File -FilePath "./TestResults/coverage-summary.txt"
        }
      shell: pwsh
    
    # Performance Threshold Check
    - name: Performance Baseline Check
      run: |
        Write-Host "=========================================="
        Write-Host "Performance Thresholds"
        Write-Host "=========================================="
        Write-Host "| Metric | Warning | Critical |"
        Write-Host "|--------|---------|----------|"
        Write-Host "| Startup Time | 3000ms | 5000ms |"
        Write-Host "| Memory (Idle) | 80MB | 150MB |"
        Write-Host "| CPU (Idle) | 30% | 50% |"
        Write-Host "| Weather API | 2000ms | 5000ms |"
      shell: pwsh
    
    # Generate Test Report
    - name: Generate Test Summary
      if: always()
      run: |
        Write-Host "=========================================="
        Write-Host "Test Summary"
        Write-Host "=========================================="
        
        $trxFile = Get-ChildItem -Path "./TestResults" -Filter "*.trx" -Recurse | Select-Object -First 1
        if ($trxFile) {
          [xml]$trx = Get-Content $trxFile.FullName
          $results = $trx.TestRun.ResultSummary.Counters
          
          Write-Host "Total: $($results.total)"
          Write-Host "Passed: $($results.passed)"
          Write-Host "Failed: $($results.failed)"
          Write-Host "Skipped: $($results.notExecuted)"
          
          # Save summary
          "Total: $($results.total), Passed: $($results.passed), Failed: $($results.failed)" | Out-File -FilePath "./TestResults/test-summary.txt"
        }
      shell: pwsh
    
    # Upload Artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SmartDesktopAssistant-build
        path: |
          Output/*.dll
          Output/*.exe
        retention-days: 7
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          TestResults/
        retention-days: 7
    
    # Final Status
    - name: Check Results
      if: always()
      run: |
        Write-Host "=========================================="
        Write-Host "CI Pipeline Complete"
        Write-Host "=========================================="
        Write-Host "Check artifacts for detailed results"
      shell: pwsh
