name: Build, Analyze and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore SmartDesktopAssistant.sln
    
    - name: Build
      run: dotnet build SmartDesktopAssistant.sln --configuration Release --no-restore
    
    - name: Run Unit Tests with Coverage
      run: |
        dotnet test Tests/SmartDesktopAssistant.Tests/SmartDesktopAssistant.Tests.csproj `
          --configuration Release --no-build `
          --verbosity normal `
          --logger "trx;LogFileName=test-results.trx" `
          --collect:"XPlat Code Coverage"
      continue-on-error: true
    
    - name: Generate Coverage Report
      run: |
        Write-Host "=========================================="
        Write-Host "Code Coverage Report"
        Write-Host "=========================================="
        
        # Find coverage file
        $coverageFile = Get-ChildItem -Path ".\Tests" -Recurse -Filter "coverage.cobertura.xml" | Select-Object -First 1
        if ($coverageFile) {
          Write-Host "Coverage file found: $($coverageFile.FullName)"
          
          # Parse coverage percentage
          [xml]$xml = Get-Content $coverageFile.FullName
          $lineRate = $xml.coverage.'line-rate'
          $branchRate = $xml.coverage.'branch-rate'
          
          Write-Host "Line Coverage: $([math]::Round([double]$lineRate * 100, 2))%"
          Write-Host "Branch Coverage: $([math]::Round([double]$branchRate * 100, 2))%"
          
          # Check threshold (80%)
          if ([double]$lineRate -lt 0.8) {
            Write-Host "::warning::Coverage is below 80% threshold"
          } else {
            Write-Host "::notice::Coverage meets 80% threshold!"
          }
        } else {
          Write-Host "No coverage file found"
        }
      shell: pwsh
    
    - name: Performance Threshold Check
      if: always()
      run: |
        Write-Host "=========================================="
        Write-Host "Performance Thresholds"
        Write-Host "=========================================="
        Write-Host "Startup time: < 5000ms (critical), < 3000ms (warning)"
        Write-Host "Memory usage: < 150MB (critical), < 80MB (warning)"
        Write-Host "CPU idle: < 50% (critical), < 30% (warning)"
        Write-Host "Weather API: < 5000ms (critical), < 2000ms (warning)"
      shell: pwsh
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SmartDesktopAssistant-build
        path: |
          Output/*.dll
          Output/*.exe
        retention-days: 7
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          Tests/SmartDesktopAssistant.Tests/TestResults/*.trx
          Tests/**/coverage.cobertura.xml
        retention-days: 7
